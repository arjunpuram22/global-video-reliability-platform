version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  upload-service:
    build: ./upload-service
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker-service:
    build: ./worker-service
    ports:
      - "8001:8001"
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - upload-service
      - worker-service

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=YOUR_GMAIL@gmail.com
      - GF_SMTP_PASSWORD=mygdbsmdgyyvqzaa
      - GF_SMTP_SKIP_VERIFY=true
      - GF_SMTP_FROM_ADDRESS=YOUR_GMAIL@gmail.com
    depends_on:
      - prometheus
